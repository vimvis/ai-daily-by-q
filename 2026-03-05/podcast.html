<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast | AI Daily by Q</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grain"></div>

    <header class="header">
        <div class="header-inner">
            <a href="../" style="text-decoration:none;">
                <div class="logo">AI Daily</div>
            </a>
            <div class="byline">by Q</div>
        </div>
    </header>

    <main class="main">
        <article class="detail-header">
            <span class="kicker">Podcast Episode</span>
            <h1 id="podcast-date">Daily Briefing</h1>
            <p class="detail-meta">진지한 앵커 · 유쾌한 친구 · 10 min listen</p>
        </article>

        <article class="detail-content">
            <section class="audio-section" style="margin-bottom: 48px;">
                <h3>오늘의 팟캐스트</h3>
                <audio controls id="main-audio">
                    <source src="podcast.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
                <p style="margin-top: 16px; font-size: 13px;">
                    <a href="podcast.mp3" download id="download-link" style="color: var(--accent);">Download MP3</a>
                </p>
            </section>

            <h2>Today's Topics</h2>
            <div id="topics-list">
                <p class="loading">톡내용을 불러오는 중...</p>
            </div>

            <a href="../" class="back-link">← Back to Archive</a>
        </article>
    </main>

    <footer class="footer">
        <p>AI Daily by Q — Curated for 형규형</p>
        <p class="footer-meta">Powered by 모아 AI · 2026</p>
    </footer>

    <script>
        // 날짜 표시
        const pathParts = window.location.pathname.split('/');
        const dateFolder = pathParts[pathParts.length - 2];
        if (dateFolder) {
            document.getElementById('podcast-date').textContent = dateFolder;
        }

        // 오디오 파일 존재 여부 체크
        const audio = document.getElementById('main-audio');
        const downloadLink = document.getElementById('download-link');
        
        fetch('podcast.mp3', { method: 'HEAD' })
            .then(response => {
                if (!response.ok) {
                    // 파일 없음 - Coming Soon 표시
                    audio.style.display = 'none';
                    downloadLink.style.display = 'none';
                    
                    const comingSoon = document.createElement('div');
                    comingSoon.innerHTML = `
                        <p style="color: var(--text-secondary); font-style: italic;">
                            🎙️ 팟캐스트가 준비 중입니다.<br>
                            매일 아침 7:30에 업데이트됩니다.
                        </p>
                    `;
                    audio.parentNode.insertBefore(comingSoon, audio.nextSibling);
                }
            })
            .catch(() => {
                // 에러 시에도 Coming Soon
                audio.style.display = 'none';
                downloadLink.style.display = 'none';
            });

        // 톡내용 로드
        fetch('summary.json')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('topics-list');
                if (data.headlines) {
                    container.innerHTML = '<ol>' + 
                        data.headlines.map(h => `<li style="margin-bottom: 12px;"><strong>${h.title}</strong></li>`).join('') + 
                        '</ol>';
                }
            })
            .catch(() => {
                document.getElementById('topics-list').innerHTML = '<p>톡내용을 불러올 수 없습니다.</p>';
            });
    </script>
</body>
</html>
